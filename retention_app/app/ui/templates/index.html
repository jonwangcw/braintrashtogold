<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Retention App</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Retention App</h1>
    <p class="muted">Logged in as <strong>{{ username }}</strong> — <a href="/logout">Logout</a></p>
    <p><a class="button" href="/concept-review/due">Due concept reviews</a></p>
    <section class="card">
      <h2>Ingest Content</h2>
      <form method="post" action="/ingest" enctype="multipart/form-data">
        <label>
          Title
          <input type="text" name="title" placeholder="Optional — auto-extracted from source" />
        </label>
        <label>
          URL
          <input type="url" name="url" placeholder="https://..." />
        </label>
        <p class="muted">OR upload a local text-based PDF file.</p>
        <label>
          PDF file
          <input type="file" name="pdf_file" accept="application/pdf,.pdf" />
        </label>
        <button type="submit">Ingest</button>
      </form>
    </section>

    <section class="card">
      <h2>Library</h2>
      {% if contents %}
        <ul class="list">
          {% for content in contents %}
            <li>
              <a href="/content/{{ content.id }}">{{ content.title }}</a>
              <span class="status">{{ content.status }}</span>
            </li>
          {% endfor %}
        </ul>
      {% else %}
        <p>No content yet.</p>
      {% endif %}
    </section>
  </main>
</body>
</html>
