<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quiz</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <a href="/">← Back</a>
    <h1>{{ kind|title }} Quiz</h1>
    {% if questions %}
      <ol class="list">
        {% for question in questions %}
          <li>
            <strong>{{ question.question_type|title }}:</strong>
            {{ question.prompt }}
          </li>
        {% endfor %}
      </ol>
    {% else %}
      <p>Quiz questions will appear here once generated.</p>
    {% endif %}
    <form method="post" action="/quiz/{{ quiz_attempt_id }}/complete">
      {% if kind == "scheduled" %}
      <label for="comfort_rating">Comfort (1-5)</label>
      <input id="comfort_rating" name="comfort_rating" type="number" min="1" max="5" required />
      {% endif %}
      <button type="submit">Complete quiz</button>
    </form>
  </main>
</body>
</html>
